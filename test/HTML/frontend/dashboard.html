<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成績分析 — 即測即評線上測驗</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="auth-bar" id="auth-bar">
        <div class="auth-left">
            <a href="index.html"><i class="fas fa-home"></i> 回首頁</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> 登入</a>
        </div>
        <div id="user-info" class="user-info" style="display:none;">
            <img id="user-avatar" src="" alt="">
            <span id="user-name"></span>
            <button class="btn-logout" onclick="logout()">登出</button>
        </div>
        <button class="btn-google" id="login-btn" onclick="login()">
            <img src="https://www.google.com/favicon.ico" alt="">
            <span>使用 Google 登入</span>
        </button>
    </div>
    <span class="title"><a href="index.html" class="link">即測即評題庫網</a></span>

    <div class="dashboard-container">
        <!-- Login prompt -->
        <div id="login-prompt" class="login-prompt">
            <i class="fas fa-chart-line"></i>
            <h2>成績分析</h2>
            <p>登入後即可查看您的作答記錄、成績趨勢與各工作項目能力分析</p>
            <button class="btn-google" onclick="login()" style="display:inline-flex;width:auto;margin:0 auto;">
                <img src="https://www.google.com/favicon.ico" alt="">
                <span>使用 Google 登入</span>
            </button>
        </div>

        <!-- Dashboard content (hidden until login) -->
        <div id="dash-content" style="display:none;">
            <!-- Subject tabs -->
            <div class="subject-tabs">
                <button class="tab active" data-subject="11700" onclick="switchSubject('11700')">11700 數位電子乙級</button>
                <button class="tab" data-subject="11800" onclick="switchSubject('11800')">11800 電腦軟體應用丙級</button>
                <button class="tab" data-subject="common" onclick="switchSubject('common')">共同科目</button>
            </div>

            <!-- Stats cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="stat-exams">0</div>
                        <div class="stat-label">測驗次數</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="stat-answered">0</div>
                        <div class="stat-label">總答題數</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="stat-best">0%</div>
                        <div class="stat-label">最高分</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-percentage"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="stat-avg">0%</div>
                        <div class="stat-label">平均正確率</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="stat-latest">0%</div>
                        <div class="stat-label">最近一次</div>
                    </div>
                </div>
            </div>

            <!-- Charts row -->
            <div class="charts-row">
                <div class="chart-card">
                    <h3><i class="fas fa-chart-bar"></i> 各工作項目正確率</h3>
                    <div class="chart-wrap">
                        <canvas id="wi-bar-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-chart-pie"></i> 能力分布雷達圖</h3>
                    <div class="chart-wrap">
                        <canvas id="ability-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Score trend -->
            <div class="chart-card full">
                <h3><i class="fas fa-wave-square"></i> 成績趨勢</h3>
                <div class="chart-wrap">
                    <canvas id="trend-chart"></canvas>
                </div>
            </div>

            <!-- History -->
            <div class="history-section">
                <div class="history-header">
                    <h3><i class="fas fa-history"></i> 測驗歷史紀錄</h3>
                    <div class="history-controls">
                        <select id="history-type-filter" onchange="renderHistory()">
                            <option value="all">全部題型</option>
                            <option value="single">單選題</option>
                            <option value="multiple">複選題</option>
                        </select>
                        <button class="btn-sm" onclick="exportHistory()"><i class="fas fa-download"></i> 匯出 CSV</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>日期</th>
                                <th>題型</th>
                                <th>正確</th>
                                <th>總題數</th>
                                <th>正確率</th>
                                <th>各工作項目</th>
                            </tr>
                        </thead>
                        <tbody id="score-history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 即測即評題庫網. All rights reserved.</footer>

    <script src="script.js"></script>
    <script src="firebase-config.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
