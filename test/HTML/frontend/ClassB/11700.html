<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>數位電子乙級</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="top-link"><i class="fas fa-home"></i> 回首頁</a>
        <a href="../dashboard.html" class="top-link"><i class="fas fa-chart-bar"></i> 成績分析</a>
        <div class="top-right" id="top-right">
            <span id="top-user" style="display:none;color:var(--text-secondary);font-size:0.85rem;"></span>
            <button class="top-login" id="top-login-btn" onclick="topLogin()">登入</button>
        </div>
    </div>
    <div class="container">
        <div class="content">
            <div class="quiz-header">
                <span>乙級學科題庫線上測驗</span>
                <div class="subtitle" id="subtitle">逐題練習模式</div>
            </div>
            <div class="quiz-controls">
                <select id="subject" onchange="loadSubject()">
                    <option value="11700">11700 數位電子乙級</option>
                    <option value="common">共同科目</option>
                </select>
                <select id="work-item">
                    <option value="0">全部工作項目</option>
                </select>
                <select id="question-type">
                    <option value="all">全部題型</option>
                    <option value="single">單選題</option>
                    <option value="multiple">複選題</option>
                </select>
                <span class="stats">題號: <span id="q-num">0</span>/<span id="q-total">0</span></span>
                <button onclick="goToQuestion()" class="primary">跳至題號</button>
                <input type="number" id="goto-input" min="1" placeholder="題號" style="width: 60px;">
                <button onclick="toggleExamOverview()" id="overview-btn" style="display:none;">作答總覽</button>
                <button onclick="toggleMode()" id="mode-toggle">練習模式</button>
            </div>
            <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
            <div id="exam-overview-container" style="display:none;"></div>
            <div id="question-container"></div>
            <div class="nav-buttons" id="practice-nav">
                <button onclick="prevQuestion()" id="prev-btn" disabled>← 上一題</button>
                <button onclick="nextQuestion()" id="next-btn">下一題 →</button>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../main.js"></script>
</body>
</html>
