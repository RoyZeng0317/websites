<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>File Conversion</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <div class="container">
            <span>File Conversion</span>
            <div class="functions">
                <ul>
                    <li><a href="#" class="link" onclick="convertWordToPdf()">word to pdf</a></li>
                    <li><a href="#" class="link" onclick="convertPdfToWord()">pdf to word</a></li>
                    <li><a href="#" class="link" onclick="convertJsonToMysql()">json to mysql</a></li>
                    <li><a href="#" class="link" onclick="convertMysqlToJson()">mysql to json</a></li>
                </ul>
            </div>
            <div class="file-box">
                <div class="file-input">
                    <input type="file" id="file" class="file" accept=".txt,.docx,.pdf,.json,.sql">
                    <label for="file" class="file-input"><i class="fas fa-upload"></i> Choose a file</label>
                </div>
            </div>
        </div>
    </body>
    <footer>&copy; Author: Roy Zeng 2026 File Conversion. All rights reserved.</footer>
    <script src="script.js"></script>
</html>
