name: stocks_app
description: Stock information and analysis app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 路由
  go_router: ^14.0.0
  
  # HTTP
  dio: ^5.4.0
  
  # 狀態管理
  flutter_riverpod: ^2.5.0
  
  # 圖表
  fl_chart: ^0.68.0
  
  # Firebase Auth
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0
  
  # UI 工具
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true